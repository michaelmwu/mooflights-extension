name: Release Extension Package

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Optional existing vX.Y.Z tag to create/update a GitHub release. Leave blank to package only."
        required: false
        type: string
      draft:
        description: "Create a draft GitHub release when release_tag is set."
        required: true
        default: true
        type: boolean
      prerelease:
        description: "Mark the GitHub release as a prerelease when release_tag is set."
        required: true
        default: false
        type: boolean
  push:
    tags:
      - "v*"

permissions:
  contents: write

concurrency:
  group: release-extension-package-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  package:
    name: Build release package
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      RELEASE_TAG: ${{ github.event_name == 'push' && github.ref_name || inputs.release_tag }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          ref: ${{ inputs.release_tag || github.ref }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: package.json

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Verify
        run: |
          bun run check
          bun run typecheck
          bun run test

      - name: Verify release version
        run: node scripts/verify-release-version.mjs "${RELEASE_TAG}"

      - name: Package extension
        run: bun run package

      - name: Upload package artifact
        uses: actions/upload-artifact@v4
        with:
          name: mu-travel-flights-extension
          path: artifacts/mu-travel-flights.zip
          if-no-files-found: error

      - name: Attach package to GitHub release
        if: env.RELEASE_TAG != ''
        env:
          GH_TOKEN: ${{ github.token }}
          DRAFT_RELEASE: ${{ github.event_name == 'workflow_dispatch' && inputs.draft || 'false' }}
          PRERELEASE: ${{ github.event_name == 'workflow_dispatch' && inputs.prerelease || 'false' }}
        run: |
          if gh release view "${RELEASE_TAG}" --repo "${GITHUB_REPOSITORY}" >/dev/null 2>&1; then
            gh release upload "${RELEASE_TAG}" artifacts/mu-travel-flights.zip \
              --repo "${GITHUB_REPOSITORY}" \
              --clobber
          else
            args=(
              "${RELEASE_TAG}"
              artifacts/mu-travel-flights.zip
              --repo "${GITHUB_REPOSITORY}"
              --title "${RELEASE_TAG}"
              --notes "Mu Travel Flights extension package for ${RELEASE_TAG}. Chrome Web Store publishing is intentionally manual for now."
            )
            if [ "${DRAFT_RELEASE}" = "true" ]; then
              args+=(--draft)
            fi
            if [ "${PRERELEASE}" = "true" ]; then
              args+=(--prerelease)
            fi
            gh release create "${args[@]}"
          fi
