name: Package Extension

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  package:
    name: Build package
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: package.json

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Verify
        run: |
          bun run check
          bun run typecheck
          bun run test

      - name: Package extension
        run: bun run package

      - name: Upload package artifact
        uses: actions/upload-artifact@v4
        with:
          name: mu-travel-flights-extension
          path: artifacts/mu-travel-flights.zip
          if-no-files-found: error

      - name: Attach package to GitHub release
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${GITHUB_REF_NAME}" artifacts/mu-travel-flights.zip \
            --repo "${GITHUB_REPOSITORY}" \
            --title "${GITHUB_REF_NAME}" \
            --notes "Mu Travel Flights extension package for ${GITHUB_REF_NAME}."
