name: Release Extension Package

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Optional existing vX.Y.Z tag to create/update a GitHub release. Leave blank to package only."
        required: false
        type: string
      version_strategy:
        description: "Version to package when release_tag is blank."
        required: true
        default: next_patch
        type: choice
        options:
          - current
          - next_patch
          - next_minor
      draft:
        description: "Create a draft GitHub release when release_tag is set."
        required: true
        default: true
        type: boolean
      prerelease:
        description: "Mark the GitHub release as a prerelease when release_tag is set."
        required: true
        default: false
        type: boolean
  push:
    tags:
      - "v*"

permissions:
  contents: write

concurrency:
  group: release-extension-package-${{ inputs.release_tag || github.ref_name }}
  cancel-in-progress: false

jobs:
  package:
    name: Build release package
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      RELEASE_TAG: ${{ github.event_name == 'push' && github.ref_name || inputs.release_tag }}

    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          ref: ${{ inputs.release_tag || github.ref }}
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version-file: package.json

      - name: Setup Chrome
        id: setup-chrome
        uses: browser-actions/setup-chrome@2e1d749697dd1612b833dba4a722266286fbefcd # v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Prepare next patch version
        if: github.event_name == 'workflow_dispatch' && inputs.release_tag == '' && inputs.version_strategy == 'next_patch'
        run: bun run release:next-patch

      - name: Prepare next minor version
        if: github.event_name == 'workflow_dispatch' && inputs.release_tag == '' && inputs.version_strategy == 'next_minor'
        run: bun run release:next-minor

      - name: Verify
        run: |
          bun run check
          bun run typecheck
          bun run test

      - name: Verify release version
        run: node scripts/verify-release-version.mjs "${RELEASE_TAG}"

      - name: Package extension
        env:
          CHROME_BIN: ${{ steps.setup-chrome.outputs.chrome-path }}
          MU_TRAVEL_CRX_KEY_B64: ${{ secrets.MU_TRAVEL_CRX_KEY_B64 }}
          MU_TRAVEL_REQUIRE_CRX_KEY: ${{ env.RELEASE_TAG != '' && '1' || '' }}
        run: bun run package

      - name: Upload package artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: mu-travel-flights-extension
          path: |
            artifacts/mu-travel-flights.zip
            artifacts/mu-travel-flights.crx
          if-no-files-found: error

      - name: Attach package to GitHub release
        if: env.RELEASE_TAG != ''
        env:
          GH_TOKEN: ${{ github.token }}
          DRAFT_RELEASE: ${{ github.event_name == 'workflow_dispatch' && inputs.draft || 'false' }}
          PRERELEASE: ${{ github.event_name == 'workflow_dispatch' && inputs.prerelease || 'false' }}
        run: |
          release_notes="Mu Travel Flights extension package for ${RELEASE_TAG}. Chrome Web Store publishing is intentionally manual for now."
          if gh release view "${RELEASE_TAG}" --repo "${GITHUB_REPOSITORY}" >/dev/null 2>&1; then
            edit_args=(
              "${RELEASE_TAG}"
              --repo "${GITHUB_REPOSITORY}"
              --title "${RELEASE_TAG}"
              --notes "${release_notes}"
            )
            if [ "${DRAFT_RELEASE}" = "true" ]; then
              edit_args+=(--draft)
            else
              edit_args+=(--draft=false)
            fi
            if [ "${PRERELEASE}" = "true" ]; then
              edit_args+=(--prerelease)
            else
              edit_args+=(--prerelease=false)
            fi
            gh release edit "${edit_args[@]}"
            gh release upload "${RELEASE_TAG}" artifacts/mu-travel-flights.zip artifacts/mu-travel-flights.crx \
              --repo "${GITHUB_REPOSITORY}" \
              --clobber
          else
            args=(
              "${RELEASE_TAG}"
              artifacts/mu-travel-flights.zip
              artifacts/mu-travel-flights.crx
              --repo "${GITHUB_REPOSITORY}"
              --title "${RELEASE_TAG}"
              --notes "${release_notes}"
            )
            if [ "${DRAFT_RELEASE}" = "true" ]; then
              args+=(--draft)
            fi
            if [ "${PRERELEASE}" = "true" ]; then
              args+=(--prerelease)
            fi
            gh release create "${args[@]}"
          fi
